version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:4001"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/tradein.db
      - UPLOADS_DIR=/app/uploads
      - AUTH_REDIRECT_URI=http://localhost:8080/oauth2callback
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
