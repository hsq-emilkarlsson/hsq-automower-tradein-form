trigger:
  branches:
    include:
      - main

pool:
  name: Azure Pipelines

resources:
  repositories:
    - repository: pipelines
      type: git
      name: DevPlatform/platform-pipelines
      ref: refs/heads/main

extends:
  template: service/v1/azure-pipelines.yml@pipelines
  parameters:
    domain: tradein
    service: automower-tradetermform
    scaling:
      dev:
        minReplicas: 1
        maxReplicas: 1
        requestCpu: '0.25'
        limitCpu: '0.5'
        requestMemory: '500Mi'
        limitMemory: '1Gi'
      prod:
        minReplicas: 1
        maxReplicas: 1
        requestCpu: '0.5'
        limitCpu: '1'
        requestMemory: '1Gi'
        limitMemory: '2Gi'
    # Persistent storage – VERIFY parameter names with DevPlatform team.
    # Without these PVCs, SQLite and uploaded files are lost on every deploy.
    storage:
      - name: data
        mountPath: /app/data
        size: 1Gi
        storageClass: standard
      - name: uploads
        mountPath: /app/uploads
        size: 10Gi
        storageClass: standard
